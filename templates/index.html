<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Terabox Stream Engine — Darkened Coder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           DESIGN TOKENS & ROOT
        ========================================= */
        :root {
            --bg-deep:        #060610;
            --bg-mid:         #0b0b1a;
            --glass-bg:       rgba(255,255,255,0.04);
            --glass-bg-hover: rgba(255,255,255,0.07);
            --glass-border:   rgba(255,255,255,0.08);
            --glass-border-focus: rgba(0,245,255,0.45);
            --accent:         #00f5ff;
            --accent-dim:     rgba(0,245,255,0.15);
            --accent-glow:    rgba(0,245,255,0.35);
            --emerald:        #00e5a0;
            --emerald-dim:    rgba(0,229,160,0.12);
            --red:            #ff4d6d;
            --text-primary:   #e8eaf6;
            --text-secondary: #7a7d99;
            --text-muted:     #40435a;
            --card-shadow:    0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Figtree', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ANIMATED CANVAS */
        .bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.18; animation: orb-drift 20s ease-in-out infinite alternate; }
        .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #00f5ff, transparent 70%); top: -200px; left: -150px; animation-duration: 25s; }
        .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #7b2fff, transparent 70%); bottom: -100px; right: -100px; animation-duration: 18s; animation-direction: alternate-reverse; }
        @keyframes orb-drift { 0% { transform: translate(0,0) scale(1); } 50% { transform: translate(60px, 40px) scale(1.08); } 100% { transform: translate(-30px, 80px) scale(0.95); } }
        .bg-canvas::after { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 60px 60px; }

        .page-wrap { position: relative; z-index: 1; width: 100%; max-width: 820px; margin: 0 auto; padding: 60px 24px 80px; }
        header { text-align: center; margin-bottom: 52px; animation: fade-up 0.8s ease both; }
        .logo-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 999px; padding: 6px 16px; margin-bottom: 20px; font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; }
        .logo-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse-dot 2s ease-in-out infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.7); } }
        header h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2.2rem, 6vw, 3.6rem); letter-spacing: -0.02em; color: var(--text-primary); }
        header h1 span { background: linear-gradient(135deg, var(--accent) 0%, var(--emerald) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--text-secondary); margin-top: 10px; }

        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: var(--card-shadow); }
        .control-panel { padding: 36px 32px; margin-bottom: 32px; animation: fade-up 0.8s 0.1s ease both; }
        .panel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
        .panel-icon { width: 36px; height: 36px; background: var(--accent-dim); border: 1px solid var(--glass-border-focus); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .panel-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }

        .input-group { margin-bottom: 22px; }
        .input-group label { display: block; margin-bottom: 9px; font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.09em; }
        .input-row { display: flex; gap: 12px; }
        input[type="text"] { flex: 1; padding: 13px 16px; background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--text-primary); font-size: 0.92rem; outline: none; transition: all 0.25s; }
        input[type="text"]:focus { border-color: var(--glass-border-focus); box-shadow: 0 0 0 3px var(--accent-dim); }

        .btn-ghost { padding: 13px 16px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-secondary); font-family: 'DM Mono', monospace; font-size: 0.72rem; cursor: pointer; transition: all 0.2s; }
        .btn-ghost:hover { background: var(--glass-bg-hover); color: var(--text-primary); }
        .btn-danger { color: var(--red); border-color: rgba(255,77,109,0.2); }
        .btn-danger:hover { background: rgba(255,77,109,0.1); border-color: rgba(255,77,109,0.4); }

        .divider { height: 1px; background: var(--glass-border); margin: 24px 0; }
        #fetch-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent) 0%, var(--emerald) 100%); color: #050512; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 24px rgba(0,245,255,0.2); transition: all 0.25s; }
        #fetch-btn:hover { box-shadow: 0 6px 32px rgba(0,245,255,0.35); }
        #fetch-btn:disabled { background: rgba(255,255,255,0.08); color: var(--text-muted); cursor: not-allowed; box-shadow: none; }

        .status-bar { display: flex; align-items: center; gap: 10px; margin-top: 16px; padding: 12px 16px; background: rgba(0,0,0,0.25); border: 1px solid var(--glass-border); border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 0.78rem; }
        .status-indicator { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); }

        #dynamic-media-area { display: flex; flex-direction: column; gap: 24px; }
        .media-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; box-shadow: var(--card-shadow); animation: fade-up 0.5s ease both; }
        .media-content { width: 100%; border-radius: 12px; background: #000; display: block; margin: 0 auto; }
        img.media-content { max-height: 480px; object-fit: contain; }
        .media-details { margin-top: 20px; display: flex; flex-direction: column; gap: 14px; padding-top: 16px; border-top: 1px solid var(--glass-border); }
        .media-title { font-size: 0.92rem; font-weight: 500; color: var(--text-primary); word-break: break-all; }
        .media-stats { display: flex; gap: 16px; font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--text-secondary); }
        .stat-value { color: var(--accent); font-weight: 600; }
        
        .download-link { display: inline-flex; align-items: center; justify-content: center; color: #000; font-size: 0.85rem; font-weight: 700; text-decoration: none; padding: 12px 24px; border-radius: 8px; background: linear-gradient(135deg, var(--accent) 0%, var(--emerald) 100%); transition: all 0.2s; width: 100%; }
        .download-link:hover { box-shadow: 0 6px 20px rgba(0,245,255,0.25); transform: translateY(-2px); }
        .unsupported-placeholder { padding: 40px; background: rgba(0,0,0,0.3); color: var(--text-secondary); text-align: center; border-radius: 12px; font-family: 'DM Mono', monospace; font-size: 0.82rem; }

        footer { text-align: center; margin-top: 60px; color: var(--text-muted); font-size: 0.78rem; font-family: 'DM Mono', monospace; }
        footer a { color: var(--accent); text-decoration: none; }
        @keyframes fade-up { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-canvas" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="page-wrap">
        <header>
            <div class="logo-badge"><span class="dot"></span>Stream Engine v2</div>
            <h1>Terabox <span>Streamer</span></h1>
            <p class="subtitle">// Engineered by Darkened Coder</p>
        </header>

        <div class="control-panel glass-panel">
            <div class="panel-header">
                <div class="panel-icon">⚙</div>
                <span class="panel-title">Extraction Config</span>
            </div>

            <div class="input-group">
                <label for="tera-url">Terabox Share URL</label>
                <input type="text" id="tera-url" placeholder="https://dm.terabox.com/sharing/link?surl=...">
            </div>

            <div class="input-group">
                <label for="ndus-cookie">NDUS Cookie</label>
                <div class="input-row">
                    <input type="text" id="ndus-cookie" placeholder="Paste your ndus VIP cookie here...">
                    <button id="save-ndus" class="btn-ghost">Save</button>
                    <button id="clear-ndus" class="btn-ghost btn-danger">Clear</button>
                </div>
            </div>

            <div class="divider"></div>
            <button id="fetch-btn" onclick="fetchMedia()">⚡ Extract &amp; Stream</button>

            <div class="status-bar">
                <div class="status-indicator" id="status-dot"></div>
                <span id="status-text">Ready to extract.</span>
            </div>
        </div>

        <div id="dynamic-media-area"></div>

        <footer>
            <p>Developed by M. Sufiyan Shaikhz &nbsp;·&nbsp; <a href="#">Darkened Coder</a></p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const statusEl  = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const fetchBtn  = document.getElementById('fetch-btn');
        const dynamicMediaArea = document.getElementById('dynamic-media-area');

        function setStatus(text, color = '#00f5ff') {
            statusEl.style.color = color;
            statusEl.innerText   = text;
            statusDot.style.background = color;
            statusDot.style.boxShadow  = `0 0 8px ${color}`;
        }

        function detectMediaType(filename) {
            const extMatch = (filename || '').toLowerCase().match(/\.([0-9a-z]+)(?:[\?#]|$)/i);
            if (!extMatch) return 'unknown';
            const ext = extMatch[1];
            if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp'].includes(ext)) return 'image';
            if (['mp4', 'mkv', 'webm', 'mov', 'm3u8', 'avi'].includes(ext))  return 'video';
            if (['mp3', 'wav', 'ogg', 'm4a'].includes(ext))                  return 'audio';
            return 'unknown';
        }

        function formatFileSize(bytes) {
            if (!bytes || isNaN(bytes)) return 'Unknown';
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        document.getElementById('save-ndus').addEventListener('click', () => {
            const v = document.getElementById('ndus-cookie').value.trim();
            if (!v) return setStatus('[!] NDUS value empty', '#ff4d6d');
            localStorage.setItem('ndusCookie', v);
            setStatus('[✓] NDUS saved', '#00e5a0');
        });

        document.getElementById('clear-ndus').addEventListener('click', () => {
            localStorage.removeItem('ndusCookie');
            document.getElementById('ndus-cookie').value = '';
            setStatus('[i] NDUS cleared', '#00f5ff');
        });

        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('ndusCookie');
            if (saved) document.getElementById('ndus-cookie').value = saved;
        });

        async function fetchMedia() {
            const urlInput  = document.getElementById('tera-url').value.trim();
            const ndusInput = document.getElementById('ndus-cookie').value.trim();

            if (!urlInput || !ndusInput) return setStatus('[!] Please provide both the URL and the NDUS cookie.', '#ff4d6d');

            setStatus('[i] Crawling recursive backend structure...', '#00f5ff');
            fetchBtn.disabled = true;
            dynamicMediaArea.innerHTML = '';

            // WIRED DIRECTLY TO YOUR SEAMLESS VERCEL API LAYER
            const apiEndpoint = `https://terabox-downloader-api-gamma.vercel.app/api/fetch?url=${encodeURIComponent(urlInput)}&ndus=${encodeURIComponent(ndusInput)}`;

            try {
                const resp = await fetch(apiEndpoint);
                const data = await resp.json();

                if (!data || !data.success || !data.data || data.data.length === 0) {
                    throw new Error(data?.detail || 'Extraction failed or directory is empty.');
                }

                // Properly reads data.data array returned by your FastAPI backend loop
                data.data.forEach((file, index) => {
                    const mediaType    = detectMediaType(file.filename);
                    const safeFilename = file.filename || `Unknown_File_${index}`;
                    const fileSize     = file.size || 0;
                    const formattedSize = formatFileSize(fileSize);

                    const card = document.createElement('div');
                    card.className = 'media-card';

                    let mediaHtml = '';
                    if (mediaType === 'image') {
                        mediaHtml = `<img src="${file.raw_dlink}" alt="${safeFilename}" class="media-content">`;
                    } else if (mediaType === 'audio') {
                        mediaHtml = `<audio src="${file.stream_url}" controls preload="metadata" class="media-content"></audio>`;
                    } else if (mediaType === 'video') {
                        mediaHtml = `<video id="vid-${index}" controls preload="metadata" class="media-content"></video>`;
                    } else {
                        mediaHtml = `<div class="unsupported-placeholder">⚠ Unsupported binary playback format.<br>Download source explicitly.</div>`;
                    }

                    card.innerHTML = `
                        ${mediaHtml}
                        <div class="media-details">
                            <h2 class="media-title">${safeFilename}</h2>
                            <div class="media-stats">
                                <div>Size: <span class="stat-value">${formattedSize}</span></div>
                                <div>Type: <span class="stat-value">${mediaType.toUpperCase()}</span></div>
                            </div>
                            <a href="${file.raw_dlink}" target="_blank" rel="noreferrer" download="${safeFilename}" class="download-link">
                                ⬇ Download File
                            </a>
                        </div>
                    `;

                    dynamicMediaArea.appendChild(card);

                    if (mediaType === 'video') {
                        const vidEl = document.getElementById(`vid-${index}`);
                        if (file.stream_url.includes('.m3u8') && Hls && Hls.isSupported()) {
                            const hls = new Hls();
                            hls.loadSource(file.stream_url);
                            hls.attachMedia(vidEl);
                        } else {
                            vidEl.src = file.stream_url;
                        }
                    }
                });

                setStatus(`[✓] Crawled and streamed ${data.data.length} element(s)!`, '#00e5a0');

            } catch (err) {
                setStatus(`[!] Error: ${err.message}`, '#ff4d6d');
            } finally {
                fetchBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
